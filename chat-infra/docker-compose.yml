# docker-compose.yml

services:
  # ==========================================
  # CAMADA DE AUTENTICAÇÃO (RAUTHY)
  # ==========================================
  rauthy:
    image: ghcr.io/sebadob/rauthy:latest
    container_name: rauthy_server
    environment:
      - DATABASE_URL=sqlite:data/rauthy.sqlite
      - PUB_URL=chat.local
      - LISTEN_SCHEME=http
      - ADMIN_PASSWORD=admin_secret
      - ENC_KEYS=kid1/9B1o/aXfBwMlc/tA4KDEY47eM5S3nFpC9JbOQsZ1wFk=
      - ENC_KEY_ACTIVE=kid1
    volumes:
      - rauthy_data:/app/data
    ports:
      - "8080:8080"
    networks:
      db_net:
      web_net:
        aliases:
          - rauthy
    restart: always

  # ==========================================
  # CAMADA DE CACHE E SINCRO (REDIS)
  # ==========================================
  redis:
    image: redis:alpine
    container_name: redis_cache
    networks:
      - db_net
    restart: always

  # ==========================================
  # CAMADA DE APLICAÇÃO (NEO-CHAT)
  # ==========================================
  neo_chat_01:
    build:
      context: ./neo-chat
    container_name: neo_chat_app_01
    environment:
      - PORT=3000
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - REDIS_HOST=redis
      - OIDC_ISSUER=https://chat.local/auth/v1/
      - OIDC_CLIENT_ID=neo-chat
      - OIDC_CLIENT_SECRET=secret
      - BASE_URL=https://chat.local
    depends_on:
      - redis
    networks:
      web_net:
        aliases:
          - neo_chat
      db_net:
    restart: always

  neo_chat_02:
    build:
      context: ./neo-chat
    container_name: neo_chat_app_02
    environment:
      - PORT=3000
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - REDIS_HOST=redis
      - OIDC_ISSUER=https://chat.local/auth/v1/
      - OIDC_CLIENT_ID=neo-chat
      - OIDC_CLIENT_SECRET=secret
      - BASE_URL=https://chat.local
    depends_on:
      - redis
    networks:
      web_net:
        aliases:
          - neo_chat
      db_net:
    restart: always

  # ==========================================
  # CAMADA DE PROXY E LOAD BALANCER (NGINX HA)
  # ==========================================
  nginx_01:
    image: nginx:alpine
    container_name: nginx_proxy_01
    volumes:
      - ./nginx-config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx-certs:/etc/nginx/ssl
      - ./html-stub:/usr/share/nginx/html/ipca-chat
    networks:
      - web_net  # Isolado da rede interna de dados
    depends_on:
      - rauthy
      - neo_chat_01
      - neo_chat_02
    restart: always

  nginx_02:
    image: nginx:alpine
    container_name: nginx_proxy_02
    volumes:
      - ./nginx-config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx-certs:/etc/nginx/ssl
      - ./html-stub:/usr/share/nginx/html/ipca-chat
    networks:
      - web_net  # Isolado da rede interna de dados
    depends_on:
      - rauthy
      - neo_chat_01
      - neo_chat_02
    restart: always

  nginx_lb:
    image: nginx:alpine
    container_name: nginx_lb
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-lb-config/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - web_net
    depends_on:
      - nginx_01
      - nginx_02
    restart: always

# ==========================================
# DEFINIÇÕES GLOBAIS DE REDES E VOLUMES
# ==========================================
networks:
  db_net:
    driver: bridge
  web_net:
    driver: bridge

volumes:
  rauthy_data: