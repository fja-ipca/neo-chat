# docker-compose.yml

services:
  # ==========================================
  # CAMADA DE PERSISTÊNCIA (POSTGRESQL MASTER)
  # ==========================================
  psql_01:
    image: bitnami/postgresql:latest
    container_name: psql_01
    environment:
      - POSTGRESQL_USERNAME=chat_admin          # Usuário padrão do chat
      - POSTGRESQL_PASSWORD=senha_secreta
      - POSTGRESQL_DATABASE=chat_db             # Banco padrão do chat
      - POSTGRESQL_REPLICATION_MODE=master      # Define este nó como o Master
      - POSTGRESQL_REPLICATION_USER=replicador  # Usuário que o Slave usará para copiar os dados
      - POSTGRESQL_REPLICATION_PASSWORD=senha_replicacao
    volumes:
      - psql_master_data:/bitnami/postgresql
      - ./postgres-config:/docker-entrypoint-initdb.d:ro  # Pasta atualizada!
    networks:
      - db_net
    restart: always

  # ==========================================
  # CAMADA DE PERSISTÊNCIA (POSTGRESQL SLAVE)
  # ==========================================
  psql_01_rr:
    image: bitnami/postgresql:latest
    container_name: psql_01_rr
    environment:
      - POSTGRESQL_PASSWORD=senha_secreta
      - POSTGRESQL_REPLICATION_MODE=slave       # Define este nó como uma Réplica (Slave)
      - POSTGRESQL_MASTER_HOST=psql_01          # Aponta para o nome do contêiner do Master
      - POSTGRESQL_MASTER_PORT_NUMBER=5432
      - POSTGRESQL_REPLICATION_USER=replicador  # Usa as credenciais que o Master liberou
      - POSTGRESQL_REPLICATION_PASSWORD=senha_replicacao
    volumes:
      - psql_replica_data:/bitnami/postgresql   # Volume próprio para a réplica
    depends_on:
      - psql_01
    networks:
      - db_net
    restart: always

# ==========================================
  # CAMADA DE BALANCEAMENTO DE DADOS (PGPOOL-II)
  # ==========================================
  pgpool:
    image: bitnamilegacy/pgpool:4.6.2-debian-12-r7
    container_name: pgpool_balancer
    environment:
      - PGPOOL_BACKEND_NODES=0:psql_01:5432,1:psql_01_rr:5432
      - PGPOOL_SR_CHECK_USER=chat_admin
      - PGPOOL_SR_CHECK_PASSWORD=senha_secreta
      - PGPOOL_SR_CHECK_DATABASE=chat_db
      - PGPOOL_ENABLE_LOAD_BALANCE=yes
      # Novas variáveis obrigatórias da imagem legacy:
      - PGPOOL_ADMIN_USERNAME=admin
      - PGPOOL_ADMIN_PASSWORD=senha_pgpool_admin
      - PGPOOL_POSTGRES_USERNAME=chat_admin
      - PGPOOL_POSTGRES_PASSWORD=senha_secreta
    ports:
      - "5432:5432"
    depends_on:
      - psql_01
      - psql_01_rr
    networks:
      - db_net
    restart: always

  # ==========================================
  # CAMADA DE AUTENTICAÇÃO (AUTHELIA)
  # ==========================================
  authelia:
    image: authelia/authelia:latest
    container_name: authelia_server
    user: "1000:1000"
    ports:
      - "9091:9091"
    volumes:
      - ./authelia-config:/config
    networks:
      db_net:
      web_net:
        aliases:
          - authelia
    depends_on:
      - pgpool
    restart: always

  # ==========================================
  # CAMADA DE APLICAÇÃO (NEO-CHAT)
  # ==========================================
  neo_chat_01:
    build:
      context: ./neo-chat
    container_name: neo_chat_app_01
    environment:
      - PORT=3000
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - DB_HOST=pgpool
    networks:
      web_net:
        aliases:
          - neo_chat
      db_net:
    restart: always

  neo_chat_02:
    build:
      context: ./neo-chat
    container_name: neo_chat_app_02
    environment:
      - PORT=3000
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - DB_HOST=pgpool
    networks:
      web_net:
        aliases:
          - neo_chat
      db_net:
    restart: always

  # ==========================================
  # CAMADA DE PROXY E LOAD BALANCER (NGINX HA)
  # ==========================================
  nginx_01:
    image: nginx:alpine
    container_name: nginx_proxy_01
    volumes:
      - ./nginx-config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx-certs:/etc/nginx/ssl
      - ./html-stub:/usr/share/nginx/html/ipca-chat
    networks:
      - web_net  # Isolado da rede interna de dados
    depends_on:
      - authelia
      - neo_chat_01
      - neo_chat_02
    restart: always

  nginx_02:
    image: nginx:alpine
    container_name: nginx_proxy_02
    volumes:
      - ./nginx-config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx-certs:/etc/nginx/ssl
      - ./html-stub:/usr/share/nginx/html/ipca-chat
    networks:
      - web_net  # Isolado da rede interna de dados
    depends_on:
      - authelia
      - neo_chat_01
      - neo_chat_02
    restart: always

  nginx_lb:
    image: nginx:alpine
    container_name: nginx_lb
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-lb-config/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - web_net
    depends_on:
      - nginx_01
      - nginx_02
    restart: always

# ==========================================
# DEFINIÇÕES GLOBAIS DE REDES E VOLUMES
# ==========================================
networks:
  db_net:
    driver: bridge
  web_net:
    driver: bridge

volumes:
  psql_master_data:
  psql_replica_data: